services:
  intelligence:
    restart: always
    build:
      context: ./logic
      dockerfile: Dockerfile
    container_name: bms_intelligence
    ports:
      - "8000:8000"
    volumes:
      - ./logic:/app           # Para desarrollo en vivo
      - ./data:/app/data       # Para acceder al CSV
    env_file:
      - .env
    environment:
      - NODE_RED_URL=http://gateway:1880/replay
    networks:
      - bms_net

  ai_tester:
    restart: always
    build:
      context: ./logic
      dockerfile: Dockerfile
    container_name: bms_ai_tester
    command: ["streamlit", "run", "ui/app.py", "--server.port=8501", "--server.address=0.0.0.0"]
    ports:
      - "8501:8501"
    volumes:
      - ./logic:/app           # Para desarrollo en vivo de la UI
      - ./data:/app/data       # Para acceder al dataset
    env_file:
      - .env
    networks:
      - bms_net


  gateway:
    restart: always
    image: nodered/node-red:latest
    container_name: bms_gateway
    ports:
      - "1880:1880"
    volumes:
      - ./gateway:/data        # Persistencia de Node-RED
    networks:
      - bms_net

  visualizer:
    restart: always
    image: grafana/grafana:latest
    container_name: bms_visualizer
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./dashboard/dashboards:/var/lib/grafana/dashboards
      - ./dashboard/provisioning:/etc/grafana/provisioning
    networks:
      - bms_net

  prometheus:
    restart: always
    image: prom/prometheus:latest
    container_name: bms_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - bms_net

  notifier:
    build:
      context: ./logic
      dockerfile: Dockerfile
    container_name: bms_notifier
    command: ["python", "notifications/orchestrator.py"]
    volumes:
      - ./logic:/app
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - TZ=America/Tegucigalpa
    networks:
      - bms_net
    restart: always

networks:
  bms_net:
    driver: bridge

volumes:
  grafana_data: